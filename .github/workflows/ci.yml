name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.4

      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PySpark needs a JVM — same requirement as local dev (see Dockerfile)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests (schema validation, dedup, API normalization)
        run: pytest tests/ -v --ignore=tests/test_dag_import.py

      - name: Validate DAG imports and structure
        run: pytest tests/test_dag_import.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow image
        run: docker build -t retail-pipeline-airflow:ci .
